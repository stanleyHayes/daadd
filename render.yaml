services:
  - type: web
    name: daadd-backend
    runtime: docker
    rootDir: .
    dockerfilePath: ./Dockerfile.backend
    plan: free
    envVars:
      - fromGroup: daadd-backend-env
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: APP_PORT
        value: 4000
      - key: STORAGE_PROVIDER
        value: cloudinary
      - key: CORS_ORIGINS
        value: https://daadd.vercel.app,http://localhost:3000
    healthCheckPath: /health
    autoDeploy: true

# Shared environment variables (secrets should be set in the Render dashboard)
envVarGroups:
  - name: daadd-backend-env
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 1h
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_SECURE
        value: true
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: noreply@daadd.io
      - key: BACKEND_URL
        sync: false

# Note: Render's free tier only supports web services. Managed MongoDB and Redis are not free.
# Use MongoDB Atlas (free M0 cluster) and Upstash Redis (free tier) for persistence.
