version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: fonad-mongodb
    environment:
      MONGO_INITDB_DATABASE: fonad
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fonad-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: fonad-redis
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fonad-network

  # Elasticsearch (Analytics & Event Search)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: fonad-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200/_cluster/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - fonad-network

  # Express.js Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fonad-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/fonad
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports:
      - '4000:4000'
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/backend/src
      - /app/backend/node_modules
    networks:
      - fonad-network

  # React.js Frontend (Vite)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    container_name: fonad-frontend
    environment:
      VITE_API_URL: http://localhost:4000/api/v1
    ports:
      - '3001:3000'
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/frontend/src
      - /app/frontend/node_modules
      - /app/node_modules
    networks:
      - fonad-network


volumes:
  mongodb_data:
  redis_data:
  elasticsearch_data:

networks:
  fonad-network:
    driver: bridge
