openapi: 3.0.3
info:
  title: FonAd / DAADD API
  version: 1.0.0
  description: |
    FonAd (DAADD) is a full-featured digital advertising and analytics platform.
    It provides campaign management, real-time event tracking, AI-driven optimization,
    anomaly detection, cross-device attribution, benchmarking, storytelling reports,
    viewer reward programs, team collaboration, and notification services.
  contact:
    name: FonAd Engineering
    email: engineering@fonad.io

servers:
  - url: http://localhost:4000/api/v1
    description: Local development server

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Authentication and user session management
  - name: Users
    description: User account management (admin)
  - name: Campaigns
    description: Campaign CRUD, status transitions, AI toggling, and creative uploads
  - name: Analytics
    description: Dashboard metrics, time series, funnel, device/region breakdowns, and exports
  - name: Events
    description: Ad event tracking (single and batch) and event querying
  - name: Heatmaps
    description: Geographic heatmap data for campaigns
  - name: AI Optimization
    description: AI-powered recommendations, application, audit logs, and mode switching
  - name: Anomaly Detection
    description: Anomaly listing, resolution, and on-demand checks
  - name: Benchmarking
    description: Industry benchmark comparisons for campaigns
  - name: Attribution
    description: Cross-device attribution and user journey mapping
  - name: Storyteller
    description: AI-generated narrative campaign reports with PDF/HTML export
  - name: Rewards
    description: Viewer reward program -- claiming, balances, and history
  - name: Teams
    description: Team collaboration, invitations, role management, and audit logs
  - name: Notifications
    description: User notification feed and read-status management

paths:
  # ─────────────────────────── Auth ───────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Creates a new user account and returns a JWT token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: Authenticates a user by email and password and returns a JWT token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Account is deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh JWT token
      description: Issues a new JWT token for the currently authenticated user.
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      description: Returns the profile of the currently authenticated user.
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─────────────────────────── Users ───────────────────────────
  /users:
    get:
      tags: [Users]
      summary: List all users (admin only)
      description: Returns a paginated list of all users. Requires admin role.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      description: Returns a single user's profile.
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    patch:
      tags: [Users]
      summary: Update user
      description: Updates a user's profile. Users can only update themselves unless they are admins.
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Users]
      summary: Delete user (admin only)
      description: Permanently deletes a user account. Requires admin role.
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─────────────────────────── Campaigns ───────────────────────────
  /campaigns:
    get:
      tags: [Campaigns]
      summary: List campaigns
      description: Returns a paginated, filterable list of campaigns with impression and click counts.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/CampaignStatus'
        - name: industry
          in: query
          schema:
            $ref: '#/components/schemas/CampaignIndustry'
        - name: advertiser_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by advertiser UUID
        - name: search
          in: query
          schema:
            type: string
          description: Case-insensitive name search
      responses:
        '200':
          description: Paginated list of campaigns
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          allOf:
                            - $ref: '#/components/schemas/Campaign'
                            - type: object
                              properties:
                                impressions:
                                  type: integer
                                clicks:
                                  type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Campaigns]
      summary: Create a campaign
      description: |
        Creates a new campaign in DRAFT status. Requires advertiser, admin, or campaign_manager role.
        Budget must be at least $500 for campaigns with regional targeting.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCampaignRequest'
      responses:
        '201':
          description: Campaign created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Campaign'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /campaigns/{id}:
    get:
      tags: [Campaigns]
      summary: Get campaign by ID
      description: Returns a single campaign with advertiser and creatives relations.
      parameters:
        - $ref: '#/components/parameters/CampaignId'
      responses:
        '200':
          description: Campaign detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Campaign'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    patch:
      tags: [Campaigns]
      summary: Update a campaign
      description: Updates campaign fields. Only the owner or team members with editor/admin role can update.
      parameters:
        - $ref: '#/components/parameters/CampaignId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCampaignRequest'
      responses:
        '200':
          description: Campaign updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Campaign'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Campaigns]
      summary: Delete a campaign
      description: |
        Deletes a DRAFT campaign permanently. Non-draft campaigns are set to COMPLETED status instead.
        Only the campaign owner can delete.
      parameters:
        - $ref: '#/components/parameters/CampaignId'
      responses:
        '200':
          description: Campaign deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /campaigns/{id}/status:
    patch:
      tags: [Campaigns]
      summary: Update campaign status
      description: Transitions a campaign to a new status. Only valid status transitions are allowed.
      parameters:
        - $ref: '#/components/parameters/CampaignId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: '#/components/schemas/CampaignStatus'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Campaign'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /campaigns/{id}/toggle-ai:
    patch:
      tags: [Campaigns]
      summary: Toggle AI optimization
      description: |
        Enables or disables AI optimization for a campaign.
        AI can only be enabled after 48 hours of campaign runtime.
      parameters:
        - $ref: '#/components/parameters/CampaignId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
                  description: Whether to enable or disable AI optimization
                mode:
                  $ref: '#/components/schemas/AiMode'
      responses:
        '200':
          description: AI optimization updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Campaign'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /campaigns/{id}/creatives:
    post:
      tags: [Campaigns]
      summary: Upload a creative asset
      description: Uploads an image or video creative asset for a campaign.
      parameters:
        - $ref: '#/components/parameters/CampaignId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image (png, jpg, gif, webp) or video (mp4, webm, mov) file
      responses:
        '201':
          description: Creative uploaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Creative'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─────────────────────────── Analytics ───────────────────────────
  /analytics/dashboard/{campaignId}:
    get:
      tags: [Analytics]
      summary: Get dashboard metrics
      description: |
        Returns aggregate metrics for a campaign including impressions, clicks, conversions,
        CTR, conversion rate, CPC, CPA, bounce rate, and budget usage.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
      responses:
        '200':
          description: Dashboard metrics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardMetrics'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /analytics/timeseries/{campaignId}:
    get:
      tags: [Analytics]
      summary: Get time series data
      description: Returns impressions, clicks, and conversions aggregated by hour or day.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
        - name: granularity
          in: query
          schema:
            type: string
            enum: [hour, day]
            default: day
          description: Time bucket granularity
      responses:
        '200':
          description: Time series data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/TimeSeriesPoint'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /analytics/funnel/{campaignId}:
    get:
      tags: [Analytics]
      summary: Get funnel data
      description: Returns conversion funnel stages (Impressions -> Clicks -> Conversions) with drop-off rates.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
      responses:
        '200':
          description: Funnel data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/FunnelStage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /analytics/devices/{campaignId}:
    get:
      tags: [Analytics]
      summary: Get device breakdown
      description: Returns event counts grouped by device type with percentage distribution.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
      responses:
        '200':
          description: Device breakdown
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/DeviceBreakdown'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /analytics/regions/{campaignId}:
    get:
      tags: [Analytics]
      summary: Get region breakdown
      description: Returns impressions, clicks, and CTR grouped by country and city.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
      responses:
        '200':
          description: Region breakdown
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/RegionBreakdown'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /analytics/export/{campaignId}/csv:
    get:
      tags: [Analytics]
      summary: Export analytics as CSV
      description: Generates and downloads a CSV file with summary metrics, time series, device, and regional data.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
      responses:
        '200':
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename=analytics-<campaignId>.csv
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /analytics/export/{campaignId}/pdf:
    get:
      tags: [Analytics]
      summary: Export analytics as PDF
      description: Generates and downloads a PDF report with summary metrics, funnel, and device breakdown.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
      responses:
        '200':
          description: PDF file download
          content:
            application/pdf:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename=analytics-<campaignId>.pdf
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─────────────────────────── Events ───────────────────────────
  /events/track:
    post:
      tags: [Events]
      summary: Track a single ad event
      description: Records a single ad event (impression, click, conversion, etc.). No authentication required.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackEventRequest'
      responses:
        '201':
          description: Event tracked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdEvent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /events/batch:
    post:
      tags: [Events]
      summary: Batch track ad events
      description: Records up to 1000 ad events in a single request. No authentication required.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchTrackRequest'
      responses:
        '201':
          description: Events tracked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          tracked:
                            type: integer
                            description: Number of events successfully tracked
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /events/campaign/{campaignId}:
    get:
      tags: [Events]
      summary: Get events for a campaign
      description: Returns a paginated and filterable list of events for a given campaign.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
        - name: event_type
          in: query
          schema:
            $ref: '#/components/schemas/EventType'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
        - name: device_type
          in: query
          schema:
            $ref: '#/components/schemas/DeviceType'
      responses:
        '200':
          description: Paginated list of events
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AdEvent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─────────────────────────── Heatmaps ───────────────────────────
  /heatmaps/{campaignId}:
    get:
      tags: [Heatmaps]
      summary: Get heatmap data
      description: Returns geographic heatmap data points for a campaign including lat/lng, city, country, and engagement metrics.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
      responses:
        '200':
          description: Heatmap data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HeatmapResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─────────────────────────── AI Optimization ───────────────────────────
  /ai/recommendations/{campaignId}:
    get:
      tags: [AI Optimization]
      summary: Get AI recommendations
      description: Returns a list of AI-generated optimization recommendations for a campaign.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
      responses:
        '200':
          description: List of AI recommendations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AIRecommendation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /ai/apply/{campaignId}/{recommendationId}:
    post:
      tags: [AI Optimization]
      summary: Apply an AI recommendation
      description: Applies a specific AI recommendation to a campaign and logs the action.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
        - name: recommendationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The recommendation UUID to apply
      responses:
        '200':
          description: Recommendation applied
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AiAuditLog'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /ai/audit-log/{campaignId}:
    get:
      tags: [AI Optimization]
      summary: Get AI audit log
      description: Returns the history of all AI actions and recommendations for a campaign.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
      responses:
        '200':
          description: AI audit log entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AiAuditLog'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /ai/mode/{campaignId}:
    patch:
      tags: [AI Optimization]
      summary: Update AI mode
      description: Changes the AI optimization mode for a campaign (auto_adjust or recommendation_only).
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  $ref: '#/components/schemas/AiMode'
      responses:
        '200':
          description: AI mode updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Campaign'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─────────────────────────── Anomaly Detection ───────────────────────────
  /anomalies/{campaignId}:
    get:
      tags: [Anomaly Detection]
      summary: List anomalies for a campaign
      description: Returns all detected anomalies for a given campaign.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
      responses:
        '200':
          description: List of anomalies
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Anomaly'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /anomalies/{id}/resolve:
    post:
      tags: [Anomaly Detection]
      summary: Resolve an anomaly
      description: Marks an anomaly as resolved by the current user.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Anomaly UUID
      responses:
        '200':
          description: Anomaly resolved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Anomaly'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /anomalies/check/{campaignId}:
    post:
      tags: [Anomaly Detection]
      summary: Trigger anomaly check
      description: Runs an on-demand anomaly detection scan for a campaign and returns any newly detected anomalies.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
      responses:
        '200':
          description: Anomaly check results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Anomaly'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─────────────────────────── Benchmarking ───────────────────────────
  /benchmarks/{campaignId}:
    get:
      tags: [Benchmarking]
      summary: Get industry benchmarks
      description: Returns benchmark comparisons of a campaign's metrics against industry averages.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
      responses:
        '200':
          description: Benchmark comparison data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/BenchmarkComparison'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─────────────────────────── Attribution ───────────────────────────
  /attribution/{campaignId}:
    get:
      tags: [Attribution]
      summary: Get cross-device attribution data
      description: Returns cross-device user journeys for a campaign showing how users interact across devices.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
      responses:
        '200':
          description: Cross-device journey data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/DeviceJourney'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /attribution/journey/{userId}:
    get:
      tags: [Attribution]
      summary: Get user journey
      description: Returns the complete ad interaction journey for a specific user.
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User journey data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DeviceJourney'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /attribution/devices/{campaignId}:
    get:
      tags: [Attribution]
      summary: Get device path mapping
      description: Returns device-to-device path mappings showing common cross-device conversion paths.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
      responses:
        '200':
          description: Device path mapping
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            path:
                              type: array
                              items:
                                type: string
                              description: Ordered list of device types in the path
                            count:
                              type: integer
                              description: Number of users following this path
                            conversion_rate:
                              type: number
                              format: float
                              description: Conversion rate for this device path
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─────────────────────────── Storyteller ───────────────────────────
  /storyteller/{campaignId}:
    get:
      tags: [Storyteller]
      summary: Generate campaign story
      description: Generates an AI-powered narrative report for a campaign with chapters, insights, and recommendations.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
      responses:
        '200':
          description: Campaign story
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CampaignStory'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /storyteller/{campaignId}/export/pdf:
    get:
      tags: [Storyteller]
      summary: Export story as PDF
      description: Generates and downloads the campaign story as a PDF document.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
      responses:
        '200':
          description: PDF file download
          content:
            application/pdf:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename=story-<campaignId>.pdf
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /storyteller/{campaignId}/export/html:
    get:
      tags: [Storyteller]
      summary: Export story as HTML
      description: Generates and downloads the campaign story as an HTML document.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
      responses:
        '200':
          description: HTML file download
          content:
            text/html:
              schema:
                type: string
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename=story-<campaignId>.html
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─────────────────────────── Rewards ───────────────────────────
  /rewards:
    get:
      tags: [Rewards]
      summary: Get user rewards
      description: Returns a paginated list of rewards for the authenticated user.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
      responses:
        '200':
          description: Paginated list of rewards
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Reward'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /rewards/claim/{eventId}:
    post:
      tags: [Rewards]
      summary: Claim a reward
      description: Claims a reward for a specific ad event. The reward value is determined by the campaign's reward_value setting.
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ad event UUID to claim a reward for
      responses:
        '201':
          description: Reward claimed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Reward'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /rewards/balance:
    get:
      tags: [Rewards]
      summary: Get reward balance
      description: Returns the total reward balance for the authenticated user.
      responses:
        '200':
          description: Reward balance
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          balance:
                            type: number
                            format: float
                            description: Total available reward balance
                          total_earned:
                            type: number
                            format: float
                            description: Lifetime total rewards earned
                          total_redeemed:
                            type: number
                            format: float
                            description: Lifetime total rewards redeemed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─────────────────────────── Teams ───────────────────────────
  /teams/invite:
    post:
      tags: [Teams]
      summary: Invite a team member
      description: Sends an invitation to join a campaign team with the specified role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteMemberRequest'
      responses:
        '201':
          description: Invitation sent
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TeamMember'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /teams/campaign/{campaignId}:
    get:
      tags: [Teams]
      summary: List team members
      description: Returns all team members for a campaign.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
      responses:
        '200':
          description: List of team members
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/TeamMember'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /teams/{id}/role:
    patch:
      tags: [Teams]
      summary: Update team member role
      description: Changes the role of a team member on a campaign.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Team member UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: '#/components/schemas/TeamRole'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TeamMember'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /teams/{id}:
    delete:
      tags: [Teams]
      summary: Remove team member
      description: Removes a member from a campaign team.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Team member UUID
      responses:
        '200':
          description: Member removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /teams/audit-log/{campaignId}:
    get:
      tags: [Teams]
      summary: Get team audit log
      description: Returns the audit log of all changes made to a campaign by team members.
      parameters:
        - $ref: '#/components/parameters/CampaignIdPath'
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AuditLog'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─────────────────────────── Notifications ───────────────────────────
  /notifications:
    get:
      tags: [Notifications]
      summary: Get user notifications
      description: Returns all notifications for the authenticated user. Optionally filter to unread only.
      parameters:
        - name: unread
          in: query
          schema:
            type: string
            enum: ['true', 'false']
          description: When "true", return only unread notifications
      responses:
        '200':
          description: List of notifications
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Mark notification as read
      description: Marks a single notification as read for the authenticated user.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Notification UUID
      responses:
        '200':
          description: Marked as read
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /notifications/read-all:
    patch:
      tags: [Notifications]
      summary: Mark all notifications as read
      description: Marks all notifications as read for the authenticated user.
      responses:
        '200':
          description: All notifications marked as read
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          updated:
                            type: integer
                            description: Number of notifications marked as read
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login or /auth/register

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for pagination
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Number of items per page
    Sort:
      name: sort
      in: query
      schema:
        type: string
        default: created_at
      description: Field name to sort by
    Order:
      name: order
      in: query
      schema:
        type: string
        enum: [ASC, DESC]
        default: DESC
      description: Sort order
    CampaignId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Campaign UUID
    CampaignIdPath:
      name: campaignId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Campaign UUID
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: User UUID
    StartDate:
      name: start_date
      in: query
      schema:
        type: string
        format: date-time
      description: Filter start date (ISO 8601)
    EndDate:
      name: end_date
      in: query
      schema:
        type: string
        format: date-time
      description: Filter end date (ISO 8601)

  responses:
    BadRequest:
      description: Bad request -- missing or invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized -- missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden -- insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ─────────────── Enums ───────────────
    UserRole:
      type: string
      enum: [advertiser, campaign_manager, analyst, end_user, admin]

    CampaignStatus:
      type: string
      enum: [draft, active, paused, completed, suspended]

    CampaignIndustry:
      type: string
      enum:
        - entertainment
        - sports
        - retail
        - technology
        - food_beverage
        - health
        - finance
        - education
        - travel
        - automotive
        - other

    AiMode:
      type: string
      enum: [auto_adjust, recommendation_only]

    EventType:
      type: string
      enum: [impression, click, conversion, share, reward_claim, ad_view, ad_dismiss]

    DeviceType:
      type: string
      enum: [desktop, mobile, tablet]

    CreativeType:
      type: string
      enum: [image, video]

    AnomalyType:
      type: string
      enum: [low_ctr, ctr_spike, traffic_spike, bot_detected]

    AnomalySeverity:
      type: string
      enum: [low, medium, high, critical]

    RewardStatus:
      type: string
      enum: [pending, credited, redeemed, expired]

    TeamRole:
      type: string
      enum: [viewer, editor, admin]

    InviteStatus:
      type: string
      enum: [pending, accepted, rejected]

    # ─────────────── Entity Schemas ───────────────
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, email, name, role, is_active, created_at, updated_at]

    Campaign:
      type: object
      properties:
        id:
          type: string
          format: uuid
        advertiser_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        budget_total:
          type: number
          format: float
          description: Total campaign budget in USD
        budget_spent:
          type: number
          format: float
          description: Amount of budget spent so far
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        industry:
          $ref: '#/components/schemas/CampaignIndustry'
        targeting_config:
          $ref: '#/components/schemas/TargetingConfig'
        status:
          $ref: '#/components/schemas/CampaignStatus'
        ai_optimization_enabled:
          type: boolean
        ai_mode:
          $ref: '#/components/schemas/AiMode'
        reward_value:
          type: number
          format: float
          description: Reward amount per qualifying event
        is_age_restricted:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        advertiser:
          $ref: '#/components/schemas/User'
        creatives:
          type: array
          items:
            $ref: '#/components/schemas/Creative'
      required:
        - id
        - advertiser_id
        - name
        - budget_total
        - budget_spent
        - start_date
        - end_date
        - industry
        - status
        - ai_optimization_enabled
        - ai_mode
        - reward_value
        - is_age_restricted
        - created_at
        - updated_at

    TargetingConfig:
      type: object
      nullable: true
      properties:
        age_range:
          type: object
          properties:
            min:
              type: integer
            max:
              type: integer
        regions:
          type: array
          items:
            type: string
        devices:
          type: array
          items:
            type: string
        languages:
          type: array
          items:
            type: string

    Creative:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campaign_id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/CreativeType'
        url:
          type: string
          description: Relative URL path to the uploaded file
        format:
          type: string
          description: File extension (e.g. png, mp4)
        file_size:
          type: integer
          description: File size in bytes
        original_name:
          type: string
          description: Original uploaded file name
        created_at:
          type: string
          format: date-time
      required: [id, campaign_id, type, url, format, file_size, original_name, created_at]

    AdEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_type:
          $ref: '#/components/schemas/EventType'
        campaign_id:
          type: string
          format: uuid
        ad_id:
          type: string
          nullable: true
        user_id:
          type: string
          format: uuid
          nullable: true
        device_type:
          $ref: '#/components/schemas/DeviceType'
        device_id:
          type: string
          nullable: true
        ip_address:
          type: string
          nullable: true
        geo_lat:
          type: number
          format: float
          nullable: true
        geo_lng:
          type: number
          format: float
          nullable: true
        geo_city:
          type: string
          nullable: true
        geo_country:
          type: string
          nullable: true
        unified_user_id:
          type: string
          nullable: true
          description: Cross-device unified user identifier
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        created_at:
          type: string
          format: date-time
      required: [id, event_type, campaign_id, device_type, created_at]

    Anomaly:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campaign_id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/AnomalyType'
        severity:
          $ref: '#/components/schemas/AnomalySeverity'
        metric_value:
          type: number
          format: float
          description: The observed metric value that triggered the anomaly
        threshold_value:
          type: number
          format: float
          description: The expected threshold value
        description:
          type: string
        auto_action_taken:
          type: string
          nullable: true
          description: Description of any automatic action taken
        resolved:
          type: boolean
        resolved_by:
          type: string
          format: uuid
          nullable: true
        resolved_at:
          type: string
          format: date-time
          nullable: true
        detected_at:
          type: string
          format: date-time
      required:
        - id
        - campaign_id
        - type
        - severity
        - metric_value
        - threshold_value
        - description
        - resolved
        - detected_at

    AiAuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campaign_id:
          type: string
          format: uuid
        action_type:
          type: string
          description: Type of AI action (e.g. budget_adjustment, targeting_change)
        recommendation:
          type: string
          description: Human-readable recommendation text
        applied:
          type: boolean
          description: Whether the recommendation was applied
        old_values:
          type: object
          additionalProperties: true
          nullable: true
          description: Previous field values before the change
        new_values:
          type: object
          additionalProperties: true
          nullable: true
          description: New field values after the change
        version:
          type: integer
          description: Version counter for audit trail
        created_by:
          type: string
          description: User ID or "SYSTEM" for automated actions
        created_at:
          type: string
          format: date-time
      required:
        - id
        - campaign_id
        - action_type
        - recommendation
        - applied
        - version
        - created_by
        - created_at

    Reward:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        campaign_id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
          nullable: true
        amount:
          type: number
          format: float
          description: Reward amount in USD
        status:
          $ref: '#/components/schemas/RewardStatus'
        earned_at:
          type: string
          format: date-time
        redeemed_at:
          type: string
          format: date-time
          nullable: true
      required: [id, user_id, campaign_id, amount, status, earned_at]

    TeamMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        campaign_id:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/TeamRole'
        invited_by:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/InviteStatus'
        created_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'
      required: [id, user_id, campaign_id, role, invited_by, status, created_at]

    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        campaign_id:
          type: string
          format: uuid
        action:
          type: string
          description: Action performed (e.g. UPDATE)
        field_changed:
          type: string
          nullable: true
          description: Name of the field that was changed
        old_value:
          type: string
          nullable: true
          description: Previous value of the field
        new_value:
          type: string
          nullable: true
          description: New value of the field
        created_at:
          type: string
          format: date-time
      required: [id, user_id, campaign_id, action, created_at]

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        type:
          type: string
          description: Notification category (e.g. anomaly_detected, campaign_update)
        title:
          type: string
        message:
          type: string
        read:
          type: boolean
        data:
          type: object
          additionalProperties: true
          nullable: true
          description: Arbitrary context data attached to the notification
        created_at:
          type: string
          format: date-time
      required: [id, user_id, type, title, message, read, created_at]

    # ─────────────── Request Schemas ───────────────
    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          description: Must be at least 8 characters
        name:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          description: JWT bearer token
      required: [user, token]

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        is_active:
          type: boolean

    CreateCampaignRequest:
      type: object
      required: [name, budget_total, start_date, end_date]
      properties:
        name:
          type: string
        description:
          type: string
        budget_total:
          type: number
          format: float
          description: Total budget in USD. Must be >= $500 if regional targeting is used.
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        industry:
          $ref: '#/components/schemas/CampaignIndustry'
        targeting_config:
          $ref: '#/components/schemas/TargetingConfig'
        reward_value:
          type: number
          format: float
          description: Per-event reward amount
        is_age_restricted:
          type: boolean

    UpdateCampaignRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        budget_total:
          type: number
          format: float
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        industry:
          $ref: '#/components/schemas/CampaignIndustry'
        targeting_config:
          $ref: '#/components/schemas/TargetingConfig'
        reward_value:
          type: number
          format: float
        is_age_restricted:
          type: boolean

    TrackEventRequest:
      type: object
      required: [event_type, campaign_id]
      properties:
        event_type:
          $ref: '#/components/schemas/EventType'
        campaign_id:
          type: string
          format: uuid
        ad_id:
          type: string
        user_id:
          type: string
          format: uuid
        device_type:
          $ref: '#/components/schemas/DeviceType'
        device_id:
          type: string
        ip_address:
          type: string
        geo_lat:
          type: number
          format: float
        geo_lng:
          type: number
          format: float
        geo_city:
          type: string
        geo_country:
          type: string
        unified_user_id:
          type: string
        metadata:
          type: object
          additionalProperties: true

    BatchTrackRequest:
      type: object
      required: [events]
      properties:
        events:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            $ref: '#/components/schemas/TrackEventRequest'

    InviteMemberRequest:
      type: object
      required: [campaign_id, email, role]
      properties:
        campaign_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/TeamRole'

    # ─────────────── Analytics / Response Schemas ───────────────
    DashboardMetrics:
      type: object
      properties:
        impressions:
          type: integer
        clicks:
          type: integer
        conversions:
          type: integer
        ctr:
          type: number
          format: float
          description: Click-through rate percentage
        conversion_rate:
          type: number
          format: float
          description: Conversion rate percentage
        cpc:
          type: number
          format: float
          description: Cost per click in USD
        cpa:
          type: number
          format: float
          description: Cost per acquisition in USD
        bounce_rate:
          type: number
          format: float
          description: Bounce rate percentage
        budget_total:
          type: number
          format: float
        budget_spent:
          type: number
          format: float
      required:
        - impressions
        - clicks
        - conversions
        - ctr
        - conversion_rate
        - cpc
        - cpa
        - bounce_rate
        - budget_total
        - budget_spent

    TimeSeriesPoint:
      type: object
      properties:
        date:
          type: string
          format: date-time
        impressions:
          type: integer
        clicks:
          type: integer
        conversions:
          type: integer
      required: [date, impressions, clicks, conversions]

    FunnelStage:
      type: object
      properties:
        stage:
          type: string
          description: Funnel stage name (Impressions, Clicks, Conversions)
        count:
          type: integer
        percentage:
          type: number
          format: float
          description: Percentage of total impressions
        drop_off:
          type: number
          format: float
          description: Drop-off percentage from total impressions
      required: [stage, count, percentage, drop_off]

    DeviceBreakdown:
      type: object
      properties:
        device_type:
          type: string
        count:
          type: integer
        percentage:
          type: number
          format: float
      required: [device_type, count, percentage]

    RegionBreakdown:
      type: object
      properties:
        country:
          type: string
        city:
          type: string
        impressions:
          type: integer
        clicks:
          type: integer
        ctr:
          type: number
          format: float
      required: [country, impressions, clicks, ctr]

    GeoDataPoint:
      type: object
      properties:
        lat:
          type: number
          format: float
        lng:
          type: number
          format: float
        city:
          type: string
        country:
          type: string
        impressions:
          type: integer
        clicks:
          type: integer
        ctr:
          type: number
          format: float
        weight:
          type: number
          format: float
      required: [lat, lng, city, country, impressions, clicks, ctr, weight]

    HeatmapResult:
      type: object
      properties:
        points:
          type: array
          items:
            $ref: '#/components/schemas/GeoDataPoint'
        total_views:
          type: integer
        aggregation_level:
          type: string
          enum: [city, country]
      required: [points, total_views, aggregation_level]

    AIRecommendation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        action_type:
          type: string
          description: Type of recommended action
        recommendation:
          type: string
          description: Human-readable recommendation
        impact:
          type: string
          description: Expected impact description
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Confidence score between 0 and 1
        old_values:
          type: object
          additionalProperties: true
        new_values:
          type: object
          additionalProperties: true
      required: [id, action_type, recommendation, impact, confidence, old_values, new_values]

    BenchmarkComparison:
      type: object
      properties:
        metric:
          type: string
          description: Metric name (e.g. ctr, conversion_rate)
        your_value:
          type: number
          format: float
        industry_avg:
          type: number
          format: float
        difference:
          type: number
          format: float
          description: Difference from industry average
        percentile:
          type: number
          format: float
          description: Percentile rank within industry (0-100)
      required: [metric, your_value, industry_avg, difference, percentile]

    StoryChapter:
      type: object
      properties:
        number:
          type: integer
        title:
          type: string
        content:
          type: string
          description: Narrative text for this chapter
        data:
          type: object
          additionalProperties: true
          description: Supporting data referenced in the narrative
      required: [number, title, content, data]

    CampaignStory:
      type: object
      properties:
        campaign_id:
          type: string
          format: uuid
        campaign_name:
          type: string
        is_preliminary:
          type: boolean
          description: True if the campaign has insufficient data for a full story
        chapters:
          type: array
          items:
            $ref: '#/components/schemas/StoryChapter'
        key_insights:
          type: array
          items:
            type: string
        recommendations:
          type: array
          items:
            type: string
        generated_at:
          type: string
          format: date-time
      required:
        - campaign_id
        - campaign_name
        - is_preliminary
        - chapters
        - key_insights
        - recommendations
        - generated_at

    DeviceJourney:
      type: object
      properties:
        unified_user_id:
          type: string
        devices:
          type: array
          items:
            type: string
          description: List of device types used
        events:
          type: array
          items:
            type: object
            properties:
              event_type:
                type: string
              device_type:
                type: string
              timestamp:
                type: string
                format: date-time
            required: [event_type, device_type, timestamp]
        conversion:
          type: boolean
          description: Whether the user eventually converted
      required: [unified_user_id, devices, events, conversion]

    # ─────────────── Wrapper Response Schemas ───────────────
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          description: Response payload (type varies by endpoint)
      required: [success]

    PaginatedResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items: {}
        pagination:
          type: object
          properties:
            total:
              type: integer
              description: Total number of records
            page:
              type: integer
              description: Current page number
            limit:
              type: integer
              description: Items per page
            totalPages:
              type: integer
              description: Total number of pages
            hasNext:
              type: boolean
            hasPrev:
              type: boolean
          required: [total, page, limit, totalPages, hasNext, hasPrev]
      required: [success, data, pagination]

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            message:
              type: string
              description: Human-readable error message
            code:
              type: string
              description: Machine-readable error code
              enum:
                - BAD_REQUEST
                - UNAUTHORIZED
                - FORBIDDEN
                - NOT_FOUND
                - CONFLICT
                - INTERNAL_ERROR
                - INVALID_CREDENTIALS
                - EMAIL_EXISTS
                - ACCOUNT_INACTIVE
                - INVALID_TRANSITION
                - INVALID_BUDGET
                - AI_NOT_READY
            details:
              description: Additional error context
          required: [message, code]
      required: [success, error]
