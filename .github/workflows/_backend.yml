name: Backend CI (reusable)

on:
  workflow_call:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s

    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://localhost:27017/adplatform-test
      JWT_SECRET: test-jwt-secret-for-ci
      TOKEN_VALUE: '0.05'
      MAX_DISCOUNT_PCT: '0.15'
      QR_EXPIRY_SECONDS: '120'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint --workspace=backend

      - name: Typecheck backend
        run: npm run typecheck --workspace=backend

      - name: Build shared
        run: npm run build:shared

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Test backend
        run: npm run test --workspace=backend
